description: >-
  Classif.io provides machine-learning-powered classification APIs that
  identify and label visual content. The flagship offering is a Fashion
  Style Classification API that detects clothing items, categorizes
  shirts, pants, dresses, and accessories from images, and supports
  outfit recommendation, retail product matching, virtual fitting room,
  social media tagging, and e-commerce styling use cases. APIs are
  delivered as REST endpoints and authenticated with API keys.
