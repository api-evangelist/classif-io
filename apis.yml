        type: Documentation
    description: >-
      The Fashion Style Classification API detects and categorizes
      clothing items from images, including shirts, pants, dresses, and
      accessories, and produces stylistic labels suitable for personal
      styling, retail recommendation, virtual fitting room, social media
      tagging, and e-commerce styling use cases.
